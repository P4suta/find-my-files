name: Feature request
description: Suggest an idea (please read the out-of-scope list first)
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## Before you file

        find-my-files is deliberately **file-name search only** — that focus is
        the reason it stays as fast as Everything. The following are explicitly
        **out of scope**, and such requests will be closed:

        - Content / property / tag indexing
        - File previews
        - FTP / HTTP / ETP servers
        - FAT / exFAT / network drives / ReFS (initially)
        - Cross-platform support (Windows-only by design)
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I confirm this is not on the out-of-scope list above.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
