# Declarative source of truth for this repo's GitHub labels (name/color/description).
# Reconciled by .github/workflows/labels-sync.yml on every push that touches this
# file (additive/update-only — `skip-delete: true`, so labels not listed here,
# e.g. GitHub defaults, are never deleted). Add a label here rather than via an
# ad-hoc `gh label create`.

# ── Release governance (ADR-0035) ──
- name: "autorelease: pending"
  color: "ededed"
  description: "Owned by release-please: marks the open Release PR and, after merge, the PR to tag. Do not remove by hand — release-label-guard.yml restores it (removing it would skip the release)."
- name: "autorelease: tagged"
  color: "ededed"
  description: "Owned by release-please: the Release PR has been merged and its vX.Y.Z tag + GitHub Release cut."
- name: "release: approved"
  color: "0e8a16"
  description: "Human approval gate: add to a Release PR to open the release-gate check and allow merge (ADR-0035). Remove to un-approve."

# ── Automation issue labels ──
- name: "sbom-vuln"
  color: "b60205"
  description: "Opened by sbom-monitor.yml when osv-scanner finds a vulnerability in a shipped SBOM."
- name: "mise-outdated"
  color: "fbca04"
  description: "Opened by mise-outdated.yml when a mise-pinned tool has drifted from its latest release."

# ── Issue-template defaults ──
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working."
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request."

# ── Dependabot ──
- name: "dependencies"
  color: "0366d6"
  description: "Dependency update (Dependabot)."
