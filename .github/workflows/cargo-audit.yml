# RustSec advisory scan over the committed engine/Cargo.lock. The scheduled
# run catches newly-disclosed advisories even when nothing changed.
name: cargo-audit

on:
  push:
    branches: [main]
    paths: ["engine/**/Cargo.toml", "engine/**/Cargo.lock"]
  pull_request:
    paths: ["engine/**/Cargo.toml", "engine/**/Cargo.lock"]
  schedule:
    - cron: "33 4 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit
        working-directory: engine
