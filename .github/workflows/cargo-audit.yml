# RustSec advisory scan over the committed lockfiles (engine + xtask). The
# scheduled run catches newly-disclosed advisories even when nothing changed.
name: cargo-audit

on:
  push:
    branches: [main]
    paths:
      - "engine/**/Cargo.toml"
      - "engine/**/Cargo.lock"
      - "xtask/Cargo.toml"
      - "xtask/Cargo.lock"
  pull_request:
    paths:
      - "engine/**/Cargo.toml"
      - "engine/**/Cargo.lock"
      - "xtask/Cargo.toml"
      - "xtask/Cargo.lock"
  schedule:
    - cron: "33 4 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-audit
      - name: cargo audit (engine)
        run: cargo audit
        working-directory: engine
      - name: cargo audit (xtask)
        run: cargo audit
        working-directory: xtask
