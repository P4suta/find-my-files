# RustSec advisory scan over the committed lockfiles (engine + xtask). The
# scheduled run catches newly-disclosed advisories even when nothing changed.
name: cargo-audit

on:
  push:
    branches: [main]
    paths:
      - "engine/**/Cargo.toml"
      - "engine/**/Cargo.lock"
      - "xtask/Cargo.toml"
      - "xtask/Cargo.lock"
  pull_request:
    paths:
      - "engine/**/Cargo.toml"
      - "engine/**/Cargo.lock"
      - "xtask/Cargo.toml"
      - "xtask/Cargo.lock"
  schedule:
    - cron: "33 4 * * 1"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cargo-audit
      - name: cargo audit (engine)
        run: cargo audit
        working-directory: engine
      - name: cargo audit (xtask)
        run: cargo audit
        working-directory: xtask
