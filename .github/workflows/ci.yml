name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: rustfmt
        run: cargo fmt --all --check
        working-directory: engine
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: engine
      - name: test (elevated tests are #[ignore]-gated and skip here)
        run: cargo test --workspace
        working-directory: engine
      - name: build engine dll
        run: cargo build --release -p fmf-ffi
        working-directory: engine

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: build app
        run: dotnet build app/FindMyFiles -c Release -p:SkipRustBuild=true

      - uses: actions/upload-artifact@v4
        with:
          name: find-my-files-win-x64
          path: app/FindMyFiles/bin/Release/net10.0-windows10.0.26100.0/win-x64/
          if-no-files-found: error
