name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs; never cancel main (post-merge lineage/artifacts).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0" # CI-only; does not touch local incremental (ADR-0014)
  CARGO_TERM_COLOR: always
  # Fail the build if Cargo.lock is stale rather than silently re-resolving — the
  # Rust counterpart to the C# RestoreLockedMode gate (docs/SUPPLY_CHAIN.md).
  CARGO_NET_LOCKED: "true"
  DOTNET_NOLOGO: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

# Least privilege by default; the only job needing more (pr-title) sets its own.
permissions:
  contents: read

jobs:
  # Skip the heavy windows jobs on docs-only PRs (ci-required treats their
  # `skipped` as success, so branch protection still passes).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - 'engine/**'
              - 'app/**'
              - 'contract/**'
              - '.github/workflows/ci.yml'

  # ── ubuntu hygiene tier: parallel, no needs, cheap fast-fail signal ──
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Lint the workflow YAML itself: syntax, ${{ }} expression types, and
      # shellcheck over run: blocks. Catches workflow errors before a release run.
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2 (reads root _typos.toml)
      - uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91 # v2
        with:
          version: "0.10.0"
      # fmt --check from the repo root enforces TOML *formatting* (taplo.toml),
      # not just validity, across every crate + the root configs.
      - run: taplo fmt --check
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
        working-directory: engine

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Prebuilt binary (cargo install from source took minutes); advisories
      # are owned by cargo-audit.yml, so this checks bans/licenses/sources.
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-deny@0.16.4
      - run: cargo deny check bans licenses sources
        working-directory: engine

  machete:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-machete@0.7.0
      - run: cargo machete engine

  # The only engine crates that compile off-Windows (no ntfs-reader/windows-sys):
  # a cheap Linux lint of the contract/proto layer.
  contract-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-linux
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy -p fmf-contract -p fmf-proto --all-targets -- -D warnings
        working-directory: engine

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The xtask dev-tooling crate (build/release plumbing) is its own workspace of
  # pure, OS-agnostic logic, so it tests on cheap ubuntu. Always runs — xtask/
  # isn't in the `changes` filter and ci-required gates on it. Advisory scanning
  # lives in cargo-audit.yml alongside the engine's.
  xtask:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: xtask
          shared-key: xtask
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo fmt --all --check
        working-directory: xtask
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: xtask
      - run: cargo test
        working-directory: xtask

  # ── windows engine tier: engine compiles once here, the app reuses the dll ──
  engine-build-test:
    needs: [hygiene, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-win # shared with codeql/nightly to reuse deps
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-llvm-cov@0.6.24
      - name: clippy (compiles the engine; later steps reuse it)
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: engine
      # Contract drift is gated by drift.rs inside the workspace test run below
      # (it runs `gen-contract --check`, covering both EngineContract.g.cs and
      # docs/contract.md), so no separate codegen + git-diff step is needed here
      # (ADR-0018).
      - name: test + line coverage gate
        run: cargo llvm-cov --workspace --fail-under-lines 70 --lcov --output-path engine-lcov.info
        working-directory: engine
      - name: doc (warnings = errors)
        run: cargo doc --workspace --no-deps
        working-directory: engine
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: build engine dll + service + cli + launcher (release, for the app + artifacts)
        run: cargo build --release -p fmf-ffi -p fmf-service -p fmf-cli -p fmf-launcher
        working-directory: engine
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-release
          path: |
            build/engine/release/fmf_engine.dll
            build/engine/release/fmf-service.exe
            build/engine/release/fmf.exe
            build/engine/release/fmf-launcher.exe
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage
          path: engine/engine-lcov.info

  app:
    needs: [engine-build-test]
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Reuse the engine dll built upstream — the app job never invokes cargo.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: engine-release
          path: build/engine/release/
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: just
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('app/**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-
      # Publish (not bare `dotnet build`): only the publish output is a runnable
      # bundle — the WinUI component package wires WinRT.Runtime.dll, the native
      # helpers and compiled XAML in at publish time. Reuses the same just recipe
      # as release.yml; skip_rust=true since the engine dll/exe are prebuilt above.
      - name: publish app (SkipRustBuild — engine binaries are prebuilt)
        run: just publish-app true
      - name: test app + coverage gate (line+branch, UI-excluded)
        run: just test-app-cov true
      - name: pipe integration (C# client × real service, unelevated)
        run: >-
          dotnet test app/FindMyFiles.Tests --settings app/FindMyFiles.Tests/pipe.runsettings
          -p:SkipRustBuild=true -p:RestoreLockedMode=true
      # The bundle's runnability (WinRT.Runtime.dll + engine binaries present) is
      # now guaranteed at the source: `just publish-app` self-verifies in xtask
      # and fails there, so a separate guard step here is redundant.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: find-my-files-win-x64
          path: build/dist/FindMyFiles/
          if-no-files-found: error

  # Informational on PRs (ADR-0013: runner thermal noise makes a hard 10% gate
  # flaky). Confirms the benches compile + run; the authoritative gate is local
  # `just perf-gate`.
  bench:
    needs: [hygiene, changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-win
          save-if: false
      - run: cargo bench -p fmf-core
        working-directory: engine

  # Single required status check. Transitively enforces the leaves and treats
  # `skipped` (docs-only) as success — avoids the "Expected — Waiting" deadlock.
  ci-required:
    if: always()
    needs: [hygiene, deny, machete, contract-lint, pr-title, xtask, engine-build-test, app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: gate on needed job results
        uses: ./.github/actions/gate-results
        with:
          results: ${{ join(needs.*.result, ',') }}
