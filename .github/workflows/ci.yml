name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast, OS-agnostic hygiene that mirrors the lefthook pre-commit hooks so the
  # same gates run in CI (where contributors don't have the hooks installed).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: typos
        uses: crate-ci/typos@master # auto-reads the root _typos.toml
      - name: setup taplo
        uses: uncenter/setup-taplo@v1
        with:
          version: "0.9.3"
      - name: taplo check
        run: taplo check
        working-directory: engine

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: rustfmt
        run: cargo fmt --all --check
        working-directory: engine
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        working-directory: engine

      # The contract generator is the single source for the C# bindings
      # (ADR-0018). Regenerate and fail if the committed copy drifts — cargo
      # test also pins this, but a discrete gate makes the failure obvious.
      - name: contract codegen
        run: cargo run -p fmf-contract --bin gen-contract
        working-directory: engine
      - name: fail on contract drift
        run: git diff --exit-code -- app/FindMyFiles/Engine/Generated/

      # Elevated tests are #[ignore]-gated and skip here; the pipe loopback
      # suite runs for real (\\.\pipe\ needs no elevation).
      - name: test
        run: cargo test --workspace
        working-directory: engine
      - name: build engine dll
        run: cargo build --release -p fmf-ffi
        working-directory: engine
      - name: build service
        run: cargo build --release -p fmf-service
        working-directory: engine

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: build app
        run: dotnet build app/FindMyFiles -c Release -p:SkipRustBuild=true
      - name: test app
        run: dotnet test app/FindMyFiles.Tests -p:SkipRustBuild=true

      - name: pipe integration (C# client × real service, unelevated)
        run: dotnet test app/FindMyFiles.Tests -p:SkipRustBuild=true
        env:
          FMF_PIPE_TESTS: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: find-my-files-win-x64
          path: app/FindMyFiles/bin/Release/net10.0-windows10.0.26100.0/win-x64/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: fmf-service-win-x64
          path: engine/target/release/fmf-service.exe
          if-no-files-found: error
