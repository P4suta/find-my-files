# Static analysis for the C# app. Rust is not a CodeQL-supported language
# (cargo-audit.yml covers the engine's dependency advisories instead).
#
# build-mode: manual because the WinUI app is self-contained and its csproj
# references fmf_engine.dll — autobuild can't infer that. We build the engine
# DLL first (the C# build copies it), then run the C# build CodeQL traces.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

# Least privilege: the token is read-only at the top level; the single job
# requests the security-events write it needs to upload SARIF (Scorecard's
# Token-Permissions check rewards job-scoped writes over top-level ones).
permissions:
  contents: read

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write # upload CodeQL SARIF results
      contents: read # checkout
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-win # shared with ci.yml/nightly to reuse deps
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('app/**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x

      # fmf_engine.dll must exist before the C# build (the csproj copies it).
      - name: build engine dll
        run: cargo build --release -p fmf-ffi
        working-directory: engine

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual

      - name: build for CodeQL
        run: dotnet build app/FindMyFiles -c Release -p:SkipRustBuild=true

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
