# Static analysis for the C# app and the GitHub Actions workflows themselves.
# Rust stays out of scope (its CodeQL support is beta/noisy); cargo-audit.yml
# covers the engine's dependency advisories instead.
#
# Two independent analyses:
#   - csharp (analyze): build-mode manual because the WinUI app is self-contained
#     and its csproj references fmf_engine.dll — autobuild can't infer that. We
#     build the engine DLL first (the C# build copies it), then trace the C# build.
#   - actions (analyze-actions): build-mode none, cheap ubuntu. Continuously
#     re-checks workflow GITHUB_TOKEN permissions so the missing-permissions
#     class can't silently regress (and closes stale alerts once code complies).
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

# Least privilege: the token is read-only at the top level; the single job
# requests the security-events write it needs to upload SARIF (Scorecard's
# Token-Permissions check rewards job-scoped writes over top-level ones).
permissions:
  contents: read

jobs:
  analyze:
    runs-on: windows-latest
    permissions:
      security-events: write # upload CodeQL SARIF results
      contents: read # checkout
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-toolchain
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-win # shared with ci.yml/nightly to reuse deps
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('app/**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x

      # fmf_engine.dll must exist before the C# build (the csproj copies it).
      - name: build engine dll
        run: cargo build --release -p fmf-ffi
        working-directory: engine

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: manual

      - name: build for CodeQL
        run: dotnet build app/FindMyFiles -c Release -p:SkipRustBuild=true

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"

  # Scans the workflow YAML itself (GITHUB_TOKEN permissions, untrusted-input,
  # etc.). build-mode none needs no toolchain, so it runs on cheap ubuntu.
  analyze-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write # upload CodeQL SARIF results
      contents: read # checkout
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:actions"
