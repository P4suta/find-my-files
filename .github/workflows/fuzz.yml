# Bounded libFuzzer smoke over the named-pipe wire codec (fmf-proto +
# fmf-contract) — the privilege-boundary parsers (non-elevated UI -> elevated
# fmf-service, docs/SECURITY.md). These build cross-platform, so they fuzz on
# Linux. cargo-fuzz needs nightly + libFuzzer (Linux), installed CI-only here;
# the pinned dev toolchain stays stable (mise.toml). Each target runs for a
# short, fixed budget so a real crash fails the run without flaking on time.
# The fmf-core parsers are proptest-covered; see docs/SCORECARD.md for why they
# are not fuzzed here yet.
name: fuzz

on:
  push:
    branches: [main]
    paths:
      - "engine/fuzz/**"
      - "engine/crates/fmf-proto/**"
      - "engine/crates/fmf-contract/**"
      - ".github/workflows/fuzz.yml"
  pull_request:
    paths:
      - "engine/fuzz/**"
      - "engine/crates/fmf-proto/**"
      - "engine/crates/fmf-contract/**"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "43 4 * * 1" # Monday 04:43 UTC (staggered from codeql/cargo-audit/scorecard)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fuzz:
    runs-on: ubuntu-latest
    # Force nightly for cargo-fuzz and every cargo build it spawns.
    env:
      RUSTUP_TOOLCHAIN: nightly
    strategy:
      fail-fast: false
      matrix:
        target: [frame_decode, message_decode]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Same pinned action as the rest of CI; nightly via the toolchain input
      # (the SHA is the stable-branch pin, but the action code is identical and
      # `toolchain` overrides what it installs).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable-branch pin
        with:
          toolchain: nightly

      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-fuzz

      # Run from engine/ so cargo-fuzz finds ./fuzz (no --fuzz-dir keeps this
      # working across cargo-fuzz versions). Artifacts land under build/engine
      # via engine/.cargo/config.toml (gitignored by build/).
      #
      # --target gnu is required: taiki-e/install-action ships a musl-static
      # cargo-fuzz, and cargo-fuzz defaults the fuzz target to its own build
      # triple (musl), but ASan is incompatible with static musl libc. The gnu
      # target is the runner host, so its std is already present.
      - name: fuzz ${{ matrix.target }} (60s)
        working-directory: engine
        run: cargo fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=60
