# Reconciles the repo's labels from .github/labels.json (the source of truth) so
# label names/colors/descriptions are version-controlled, not set by hand. Runs
# only when the manifest changes (or on demand).
#
# Deliberately done with `gh` + `jq` (both pre-installed on the runner) rather
# than a labeler action: this repo restricts Actions to a SHA-pinned allowlist
# (Settings → Actions → "selected"), so pulling in a third-party labeler would
# mean widening that trust surface. `gh label create --force` is create-or-update
# and never deletes, so the sync is additive — labels missing from the manifest
# (GitHub defaults, future tool labels) are left untouched.
name: labels-sync

on:
  push:
    branches: [main]
    paths: [".github/labels.json"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout the manifest (job perms replace, not extend, top-level)
      issues: write # create/update labels
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Sync labels from manifest (additive; never deletes)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          jq -c '.[]' .github/labels.json | while IFS= read -r row; do
            name=$(jq -r '.name' <<<"$row")
            color=$(jq -r '.color' <<<"$row")
            # GitHub caps label descriptions at 100 chars; truncate defensively.
            desc=$(jq -r '.description' <<<"$row")
            desc=${desc:0:100}
            echo "syncing: $name"
            gh label create "$name" --color "$color" --description "$desc" --force
          done
