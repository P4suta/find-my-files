# Experiment (ADR-0013 discipline: measure before gating): GitHub's
# windows-latest runners are elevated, so the FMF_ADMIN_TESTS suite — real
# C: scan, USN tailing, service E2E — might just work. Runs nightly,
# never blocks; promote into ci.yml only after it proves stable.
name: nightly-admin-smoke

on:
  schedule:
    - cron: "17 17 * * *" # 02:17 JST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  admin-tests:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine
          shared-key: engine-win # shared with ci.yml/codeql to reuse deps
      - name: elevated real-volume suite
        run: cargo test --workspace -- --ignored
        working-directory: engine
        env:
          FMF_ADMIN_TESTS: "1"
