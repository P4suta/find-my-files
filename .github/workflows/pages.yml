name: Deploy GitHub Pages

# Publishes the landing page (site/) plus generated documentation:
#   /        — landing page (site/index.html, ja/en)
#   /book/   — mdBook design docs rendered from docs/ (ARCHITECTURE + ADRs)
#   /doc/    — rustdoc API reference (cargo doc)
#   /api/    — C# API reference (DefaultDocumentation -> mdBook; app/FindMyFiles)
# Requires Settings > Pages > Source = "GitHub Actions" (set once after publish).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "engine/**"
      - "app/**"
      - "xtask/**"
      - ".config/dotnet-tools.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: read-only at the top level; the deploy job requests the
# Pages + OIDC writes it needs (Scorecard's Token-Permissions check rewards
# job-scoped writes over top-level ones).
permissions:
  contents: read

# One concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read # checkout
      pages: write # publish to GitHub Pages
      id-token: write # OIDC token the Pages deploy environment requires
    # windows-latest because rustdoc must compile the Windows-only crates
    # (fmf-core → ntfs-reader / windows-sys, fmf-service) that fail to
    # `cargo doc` on Linux. mdBook builds fine here too, so one job suffices.
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Same pinned toolchain as local (rust 1.95 / dotnet 10 / just / mdbook).
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine

      - name: Build mdBook design docs (docs/ -> build/docs-book)
        run: mdbook build docs

      - name: Build rustdoc (engine -> build/engine/doc)
        # --document-private-items: internal crates, so docs target maintainers
        # (and it resolves intra-doc links to non-pub helpers). --target-dir:
        # cargo discovers .cargo/config.toml from the CWD, not --manifest-path,
        # so route the output to build/engine/doc explicitly (ADR-0021).
        run: cargo doc --no-deps --workspace --document-private-items --manifest-path engine/Cargo.toml --target-dir build/engine

      - name: Build C# API reference (DefaultDocumentation -> mdBook -> _site)
        # Builds FindMyFiles.dll + its XML doc file (the csproj builds the Rust
        # FFI itself), restores the pinned DefaultDocumentation local tool, then
        # reads the assembly via IL and renders Markdown to HTML with mdBook —
        # works with the .NET 10 SDK where DocFX's Roslyn path fails (#40). See
        # `just doc-csharp`.
        run: just doc-csharp

      # Stage book + doc + api into site/ next to the landing page (xtask: just
      # docs-assemble), verifying all source trees exist first.
      - name: Assemble site (landing + book + doc + api)
        run: just docs-assemble

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
