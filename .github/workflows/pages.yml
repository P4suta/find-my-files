name: Deploy GitHub Pages

# Publishes the landing page (site/) plus generated documentation:
#   /        — landing page (site/index.html, ja/en)
#   /book/   — mdBook design docs rendered from docs/ (ARCHITECTURE + ADRs)
#   /doc/    — rustdoc API reference (cargo doc)
# Requires Settings > Pages > Source = "GitHub Actions" (set once after publish).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "engine/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # windows-latest because rustdoc must compile the Windows-only crates
    # (fmf-core → ntfs-reader / windows-sys, fmf-service) that fail to
    # `cargo doc` on Linux. mdBook builds fine here too, so one job suffices.
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # Same pinned toolchain as local (rust 1.95 / dotnet 10 / just / mdbook).
      - uses: jdx/mise-action@v4
        with:
          install: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build mdBook design docs (docs/ -> docs/book)
        run: mdbook build docs

      - name: Build rustdoc (engine -> engine/target/doc)
        # --document-private-items: internal crates, so docs target maintainers
        # (and it resolves intra-doc links to non-pub helpers).
        run: cargo doc --no-deps --workspace --document-private-items --manifest-path engine/Cargo.toml

      - name: Assemble site (landing + book + doc)
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force docs/book site/book
          Copy-Item -Recurse -Force engine/target/doc site/doc

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
