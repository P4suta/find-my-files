name: Deploy GitHub Pages

# Publishes the landing page (site/) plus generated documentation:
#   /        — landing page (site/index.html, ja/en)
#   /book/   — mdBook design docs rendered from docs/ (ARCHITECTURE + ADRs)
#   /doc/    — rustdoc API reference (cargo doc)
# Requires Settings > Pages > Source = "GitHub Actions" (set once after publish).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "engine/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # windows-latest because rustdoc must compile the Windows-only crates
    # (fmf-core → ntfs-reader / windows-sys, fmf-service) that fail to
    # `cargo doc` on Linux. mdBook builds fine here too, so one job suffices.
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Same pinned toolchain as local (rust 1.95 / dotnet 10 / just / mdbook).
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: engine

      - name: Build mdBook design docs (docs/ -> docs/book)
        run: mdbook build docs

      - name: Build rustdoc (engine -> engine/target/doc)
        # --document-private-items: internal crates, so docs target maintainers
        # (and it resolves intra-doc links to non-pub helpers).
        run: cargo doc --no-deps --workspace --document-private-items --manifest-path engine/Cargo.toml

      # Stage book + doc into site/ next to the landing page (xtask: just
      # docs-assemble), verifying both source trees exist first.
      - name: Assemble site (landing + book + doc)
        run: just docs-assemble

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
