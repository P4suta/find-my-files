# release-please — the version/CHANGELOG/tag bot (ADR-0035).
#
# Conventional Commits land on main → this action keeps a "Release PR" open that
# bumps engine/Cargo.toml + engine/Cargo.lock (rust release-type) and the C# csproj
# (extra-files generic updater), and updates CHANGELOG.md. Merging that PR makes
# release-please create the GitHub Release as a DRAFT (config "draft": true); this
# workflow then dispatches release.yml, which builds → signs → attaches assets to
# the draft → publishes it (publishing creates the `vX.Y.Z` tag). The draft-first
# order is what makes assets land before the release becomes immutable.
# Humans never hand-pick or hand-edit a version.
#
# Runs as a GitHub App: a short-lived installation token (actions/create-github-app-token)
# from two secrets — RELEASE_PLEASE_CLIENT_ID and RELEASE_PLEASE_PRIVATE_KEY — lets
# release-please push the release commit + open the PR with a signed identity. With
# those secrets unset the job runs green and no-ops: the scaffolding ships now, the
# App lights it up later. (The release.yml dispatch uses GITHUB_TOKEN — a
# workflow_dispatch is the one event GITHUB_TOKEN may start.) See docs/RELEASING.md.

name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never cancel a release-cut in flight; only one runs per ref anyway.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The App private key lives in this environment's secrets. Configure the
    # environment with a deployment-branch policy of `main` only, so a workflow on
    # any other branch (or a malicious workflow edit on a feature branch) cannot
    # read the credential — repository secrets, by contrast, are readable from a
    # push to any branch. Deliberately set NO required reviewers: release-please
    # must run unattended (the human gate is merging the Release PR; signing's
    # approval gate is the separate `release` environment in release.yml). ADR-0035.
    environment: release-please
    permissions:
      contents: write # create the release commit and the draft GitHub Release
      pull-requests: write # open / maintain the Release PR
      actions: write # dispatch release.yml once the draft release is created
    env:
      # Server-side boolean — never exposes the secret values.
      HAS_APP: ${{ secrets.RELEASE_PLEASE_CLIENT_ID != '' && secrets.RELEASE_PLEASE_PRIVATE_KEY != '' }}
    steps:
      # Mint a short-lived installation token scoped to this repo. Its pushes (the
      # vX.Y.Z tag) DO trigger release.yml, unlike GITHUB_TOKEN's.
      - name: Mint GitHub App token
        id: app-token
        if: env.HAS_APP == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}

      - name: release-please (active)
        id: rp
        if: env.HAS_APP == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps engine/Cargo.toml's [workspace.package] version (toml
      # updater) but not engine/Cargo.lock — release-please's rust strategy can't
      # write workspace-inherited versions (googleapis/release-please#2478), so we
      # use a generic toml bump + sync the lock here. Without this the Release PR's
      # own `--locked` CI would fail. `cargo update --workspace` only rewrites the
      # path-crate versions in the lock (no compile). It re-runs whenever a Release
      # PR is (re)built, so a later rebuild that resets the lock self-heals.
      # Parse the PR JSON in bash (jq), never `fromJSON()` in YAML: a step's `env:`
      # is evaluated eagerly regardless of `if:`, so a `fromJSON('')` there crashes
      # the run on the no-op release-please runs where `pr` is empty. This step is
      # gated on a plain string compare and emits a plain string output.
      - name: Resolve the Release PR branch
        id: rp_branch
        if: ${{ env.HAS_APP == 'true' && steps.rp.outputs.pr != '' }}
        env:
          PR_JSON: ${{ steps.rp.outputs.pr }}
        run: echo "branch=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')" >> "$GITHUB_OUTPUT"
      - name: Check out the Release PR branch
        if: ${{ steps.rp_branch.outputs.branch != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.rp_branch.outputs.branch }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Rust (only to sync the lock)
        if: ${{ steps.rp_branch.outputs.branch != '' }}
        uses: ./.github/actions/rust-toolchain
      - name: Sync Cargo.lock to the bumped workspace version
        if: ${{ steps.rp_branch.outputs.branch != '' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.rp_branch.outputs.branch }}
        run: |
          cargo update --workspace --manifest-path engine/Cargo.toml
          if git diff --quiet -- engine/Cargo.lock; then
            echo "Cargo.lock already in sync."
            exit 0
          fi
          # Commit via the Contents API, not `git push`: the repo's
          # require-signed-commits ruleset rejects an unsigned bot commit, but a
          # commit created through the API is signed by GitHub (the same way
          # release-please's own commits are). One file, on the Release PR branch.
          gh api --method PUT "repos/$REPO/contents/engine/Cargo.lock" \
            -f message="chore: sync Cargo.lock to the release version" \
            -f branch="$BRANCH" \
            -f sha="$(git rev-parse "HEAD:engine/Cargo.lock")" \
            -f content="$(base64 -w0 engine/Cargo.lock)"

      # release-please created the GitHub Release as a DRAFT (config "draft": true).
      # Draft releases don't fire `release` events and don't create the git tag, so
      # we explicitly kick off release.yml to build → sign → attach assets to the
      # draft → publish it (publishing is what creates the tag). A GITHUB_TOKEN
      # dispatch IS allowed to start a workflow_dispatch run (the documented
      # recursion-guard exception), so this needs no App token. ADR-0035.
      - name: Trigger the signed-release build
        if: ${{ env.HAS_APP == 'true' && steps.rp.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rp.outputs.tag_name }}
          SHA: ${{ steps.rp.outputs.sha }}
        run: |
          gh workflow run release.yml --repo "$REPO" --ref main \
            -f tag_name="$TAG" -f sha="$SHA" -f publish=true

      - name: release-please (dormant — App not configured)
        if: env.HAS_APP != 'true'
        run: |
          echo "::notice::release-please is dormant — set the RELEASE_PLEASE_CLIENT_ID and"
          echo "RELEASE_PLEASE_PRIVATE_KEY secrets (a GitHub App) to activate."
          echo "See docs/RELEASING.md and ADR-0035."
