# Tag-driven build/sign/publish. Pushing a vX.Y.Z tag (or running this workflow
# manually with a tag) builds the distributable bundle (`just publish`),
# Authenticode-signs our own PE binaries with SSL.com eSigner (cloud HSM) when
# signing secrets are present, then zips + checksums + attaches to a GitHub
# Release whose notes are auto-generated from the commits since the last tag.
# It also emits CycloneDX SBOMs (engine + app) and keyless build-provenance +
# SBOM attestations (Sigstore via the OIDC GITHUB_TOKEN - no stored secrets);
# verify a download with `gh attestation verify <zip> --repo P4suta/find-my-files`.
#
# Auth: the default GITHUB_TOKEN for the release; SSL.com eSigner via four repo
# secrets (ES_USERNAME / ES_PASSWORD / CREDENTIAL_ID / ES_TOTP_SECRET). Signing
# is non-blocking: until those secrets exist the run publishes an UNSIGNED zip
# with a ::warning:: rather than failing. Setup + rationale live in
# docs/SIGNING.md and docs/adr/0020-code-signing-provider.md.
#
# A manual run (workflow_dispatch) with publish=false builds + signs + verifies
# but creates no Release/attestations - a signing smoke test that is safe under
# immutable releases. Tag pushes always publish.
name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag (or ref) to build from (e.g. v0.1.0, or main for a signing test)"
        required: true
        type: string
      publish:
        description: "Publish a GitHub Release (false = build+sign+verify only, no release/attestations)"
        required: false
        default: true
        type: boolean

# Least privilege: read-only at the top level; the build job requests the
# write scopes it needs (Scorecard's Token-Permissions check rewards
# job-scoped writes over top-level ones).
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
      id-token: write # OIDC token for keyless Sigstore signing (attestations)
      attestations: write # write build-provenance + SBOM attestations
    env:
      # Resolve the tag from either trigger; reused for checkout, zip, release.
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      # secrets.* cannot be referenced in `if:`; hoist presence to a job-level
      # env bool, then gate the signing steps on env.HAVE_SIGNING.
      HAVE_SIGNING: ${{ secrets.ES_USERNAME != '' && secrets.CREDENTIAL_ID != '' }}
      # Publish the GitHub Release + attestations only on tag pushes, or on a
      # manual run that opts in (publish=true, the default). A manual run with
      # publish=false builds+signs+verifies but creates no Release - a signing
      # smoke test that is safe under immutable releases (a published release
      # cannot be deleted).
      PUBLISH: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
      # Build the shipped binaries from the committed Cargo.lock, never a silent
      # re-resolve (the cargo-sbom install step pins its own --locked).
      CARGO_NET_LOCKED: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      # Provisions the pinned toolchain (rust 1.95 / dotnet 10 / just) from
      # mise.toml so the shipped artifact is built on the exact pins.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      # SBOM tooling (release-only; deliberately not in mise.toml's dev loop).
      # cargo-sbom emits one CycloneDX doc for the whole engine workspace; the
      # CycloneDX dotnet tool covers the app's NuGet graph. Both version-pinned.
      # Append the dotnet global-tool dir to PATH for the later SBOM step.
      - name: Install SBOM tools
        shell: pwsh
        run: |
          cargo install cargo-sbom --locked --version 0.10.0
          dotnet tool install --global CycloneDX --version 6.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build distributable bundle
        run: just publish

      # SBOMs (CycloneDX 1.6 JSON), generated after the build so the resolved
      # graphs match what shipped. The Rust step uses bash because pwsh's `>`
      # would emit UTF-16. Attached to the release + attested below.
      - name: Generate Rust SBOM (CycloneDX)
        working-directory: engine
        shell: bash
        run: mkdir -p ../build/sbom && cargo sbom --output-format cyclone_dx_json_1_6 > ../build/sbom/fmf-engine.cdx.json

      - name: Generate C# SBOM (CycloneDX)
        run: >-
          dotnet CycloneDX app/FindMyFiles/FindMyFiles.csproj
          --output build/sbom --filename app.cdx.json
          --output-format Json --spec-version 1.6 --runtime win-x64

      # Authenticode-sign only our own PE binaries: FindMyFiles.exe is the one
      # SmartScreen judges, the rest are our Rust binaries. The bundled .NET /
      # WindowsAppSDK runtime DLLs are already Microsoft-signed - re-signing them
      # would waste eSigner quota and claim authorship we don't have. So we stage
      # just our four files, batch-sign them into a separate `signed/` dir, copy
      # them back, then hard-verify. eSigner is cloud HSM-backed: no token reaches
      # the runner; the TOTP secret drives unattended auth.
      - name: Stage first-party binaries for signing
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        run: |
          $bins = 'FindMyFiles.exe', 'fmf.exe', 'fmf-service.exe', 'fmf_engine.dll'
          New-Item -ItemType Directory -Force sign-stage | Out-Null
          New-Item -ItemType Directory -Force signed | Out-Null
          $bins | ForEach-Object { Copy-Item "build/dist/FindMyFiles/$_" sign-stage/ }

      - name: Sign staged binaries (SSL.com eSigner)
        if: env.HAVE_SIGNING == 'true'
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
        with:
          command: batch_sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          dir_path: ${{ github.workspace }}\sign-stage
          # Write signed files to a dedicated dir. batch_sign does NOT honor
          # `override` (the Action never forwards -override), so without an
          # explicit output_path the signed files land elsewhere and copy-back
          # would grab the unsigned originals (-> Verify "NotSigned").
          output_path: ${{ github.workspace }}\signed
          environment_name: PROD
          # Our SSL.com account requires a pre-signing malware scan; with this
          # off, batch_sign sends only hashes and SSL.com rejects with "hash
          # needs to be scanned first". true makes the Action scan the files
          # inline before signing (the maintainer's documented fix). Keeps the
          # scan as a safety gate; would need to be false only for MSIX inputs.
          malware_block: "true"

      - name: Copy signed binaries back into the bundle
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        run: Copy-Item signed/* build/dist/FindMyFiles/ -Force

      # Never ship a "signed" build that is silently unsigned: once signing was
      # requested, fail the release if any of our binaries lacks a valid
      # Authenticode signature (e.g. batch_sign wrote elsewhere and copy-back
      # picked up the unsigned originals).
      - name: Verify signatures
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($f in 'FindMyFiles.exe', 'fmf.exe', 'fmf-service.exe', 'fmf_engine.dll') {
            $sig = Get-AuthenticodeSignature "build/dist/FindMyFiles/$f"
            if ($sig.Status -ne 'Valid') {
              throw "Authenticode check failed for $f - status: $($sig.Status)"
            }
            Write-Host "signed: $f - $($sig.SignerCertificate.Subject)"
          }

      - name: Warn if unsigned
        if: env.HAVE_SIGNING != 'true'
        run: echo "::warning::Signing secrets absent - publishing UNSIGNED binaries (SmartScreen will warn end users). See docs/SIGNING.md to enable."

      # Zip + checksum the (now-signed) bundle. Runs after signing so the zip
      # holds signed binaries. Logic + output names live in xtask (just package):
      # find-my-files-v<version>-win-x64.zip + SHA256SUMS.txt under build/package/.
      # Release-only: `just package` requires a vX.Y.Z TAG, and the zip is only
      # consumed by the gated attest/release steps - so a publish=false signing
      # test (TAG=main) stops cleanly after Verify.
      - name: Package (zip + checksums)
        if: env.PUBLISH == 'true'
        run: just package ${{ env.TAG }}

      # Build provenance + SBOM attestations for the published artifacts. Keyless
      # via the workflow's OIDC token (no stored secrets). After packaging so the
      # attested zip is final (holds the signed binaries when signing ran).
      # Verify: gh attestation verify <zip> --repo P4suta/find-my-files
      - name: Attest build provenance
        if: env.PUBLISH == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            build/package/find-my-files-*-win-x64.zip
            build/package/SHA256SUMS.txt

      - name: Attest Rust SBOM
        if: env.PUBLISH == 'true'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: build/package/find-my-files-*-win-x64.zip
          sbom-path: build/sbom/fmf-engine.cdx.json

      - name: Attest C# SBOM
        if: env.PUBLISH == 'true'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: build/package/find-my-files-*-win-x64.zip
          sbom-path: build/sbom/app.cdx.json

      - name: Attach assets to release
        if: env.PUBLISH == 'true'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            build/package/find-my-files-*-win-x64.zip
            build/package/SHA256SUMS.txt
            build/sbom/fmf-engine.cdx.json
            build/sbom/app.cdx.json
