# Tag-driven build / sign / publish, split into three jobs so the signing
# credentials touch the smallest possible surface:
#
#   build   -> assembles the distributable bundle (`just publish`) + SBOMs and
#              uploads them as artifacts. Holds NO secrets, read-only token.
#   sign    -> downloads the bundle, Authenticode-signs our own PE binaries with
#              SSL.com eSigner via the eSigner CKA (Cloud Key Adapter): the cloud
#              certificate is loaded into the Windows store as a virtual token and
#              we sign with the standard `signtool` (RFC 3161 timestamp, in place),
#              then hard-verify chain + timestamp + signer. This is the only job
#              that sees the signing secrets, so it runs in the approval-gated
#              `release` environment.
#   publish -> downloads the signed bundle, zips + checksums it (`just package`),
#              writes keyless build-provenance + SBOM attestations (Sigstore via
#              the OIDC GITHUB_TOKEN - no stored secrets) and attaches everything
#              to a GitHub Release. Runs only on a tag push / publish=true.
#
# Auth: the default GITHUB_TOKEN for the release; SSL.com eSigner CKA via repo/
# environment secrets (ES_USERNAME / ES_PASSWORD / ES_TOTP_SECRET). Signing is
# non-blocking: until those secrets exist the run publishes an UNSIGNED zip with
# a ::warning:: rather than failing. Setup + rationale live in docs/SIGNING.md,
# docs/adr/0020-code-signing-provider.md (provider/cert) and
# docs/adr/0029-ci-signing-cka-pipeline.md (CKA + signtool, this 3-job shape).
#
# A manual run (workflow_dispatch) with publish=false builds + signs + verifies
# but creates no Release/attestations - a signing smoke test that is safe under
# immutable releases. Tag pushes always publish.
#
# Verify a download with `gh attestation verify <zip> --repo P4suta/find-my-files`.
name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag (or ref) to build from (e.g. v0.1.0, or main for a signing test)"
        required: true
        type: string
      publish:
        description: "Publish a GitHub Release (false = build+sign+verify only, no release/attestations)"
        required: false
        default: true
        type: boolean

# One release per ref at a time; never cancel a run mid-sign/mid-publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: read-only at the top level; each job requests only the scopes
# it needs (Scorecard's Token-Permissions check rewards job-scoped writes).
permissions:
  contents: read

env:
  # Resolve the tag from either trigger; reused for checkout, zip, release.
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  # Build the shipped binaries from the committed Cargo.lock, never a silent
  # re-resolve (the cargo-sbom install step pins its own --locked).
  CARGO_NET_LOCKED: "true"

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build the distributable bundle + SBOMs. No secrets here.
  # ---------------------------------------------------------------------------
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      # Provisions the pinned toolchain (rust / dotnet / just) from mise.toml so
      # the shipped artifact is built on the exact pins.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      # SBOM tooling (release-only; deliberately not in mise.toml's dev loop).
      # Version-pinned; both crates.io and NuGet verify package integrity against
      # their immutable indexes, so a pinned version is fetched reproducibly.
      # Append the dotnet global-tool dir to PATH for the later SBOM step.
      - name: Install SBOM tools
        shell: pwsh
        run: |
          cargo install cargo-sbom --locked --version 0.10.0
          dotnet tool install --global CycloneDX --version 6.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build distributable bundle
        run: just publish

      # SBOMs (CycloneDX 1.6 JSON), generated after the build so the resolved
      # graphs match what shipped. The Rust step uses bash because pwsh's `>`
      # would emit UTF-16. Attached to the release + attested in publish.
      - name: Generate Rust SBOM (CycloneDX)
        working-directory: engine
        shell: bash
        run: mkdir -p ../build/sbom && cargo sbom --output-format cyclone_dx_json_1_6 > ../build/sbom/fmf-engine.cdx.json

      - name: Generate C# SBOM (CycloneDX)
        run: >-
          dotnet CycloneDX app/FindMyFiles/FindMyFiles.csproj
          --output build/sbom --filename app.cdx.json
          --output-format Json --spec-version 1.6 --runtime win-x64

      - name: Upload unsigned bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: build/dist/FindMyFiles
          retention-days: 1
          if-no-files-found: error

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: build/sbom
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2) Authenticode-sign our own PEs with SSL.com eSigner (CKA + signtool).
  #    The only job with signing secrets -> approval-gated `release` environment.
  # ---------------------------------------------------------------------------
  sign:
    needs: build
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
    env:
      # secrets.* cannot be referenced in `if:`; hoist presence to a job-level
      # env bool, then gate the signing steps on env.HAVE_SIGNING. CKA is driven
      # by username/password/TOTP, so gate on those (not the legacy CREDENTIAL_ID).
      HAVE_SIGNING: ${{ secrets.ES_USERNAME != '' && secrets.ES_TOTP_SECRET != '' }}
      # Our SSL.com IV certificate's subject. Used to pick the right cert out of
      # the store after CKA load AND to assert the signer at verify time, so a
      # different (even validly-chained) certificate cannot pass silently.
      SIGNER_SUBJECT_CONTAINS: "CN=Yasunobu Sakashita"
      # eSigner CKA installer, pinned to a GitHub release asset + its SHA-256 so
      # the runtime download is integrity-checked (the version-less ssl.com/download
      # redirect is not pinnable). Bump both together; see docs/SIGNING.md.
      CKA_URL: "https://github.com/SSLcom/eSignerCKA/releases/download/v1.0.7/SSL.COM-eSigner-CKA_1.0.7.zip"
      CKA_SHA256: "0F40F0EF0AA5C7D73B2D854EC0D2F2BE551A6BBBD99CBBD886F7D3EF77C3327C"
    steps:
      - name: Download unsigned bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: build/dist/FindMyFiles

      # Acquire the CKA from the pinned release asset and refuse to proceed unless
      # the bytes match the committed SHA-256, then silently install it.
      - name: Acquire eSigner CKA (pinned + checksummed)
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest $env:CKA_URL -OutFile cka.zip
          $got = (Get-FileHash cka.zip -Algorithm SHA256).Hash
          if ($got -ne $env:CKA_SHA256) {
            throw "eSigner CKA checksum mismatch: got $got expected $env:CKA_SHA256"
          }
          Expand-Archive -Force cka.zip -DestinationPath cka-extract
          $installer = Get-ChildItem cka-extract -Recurse -Filter 'SSL.COM eSigner CKA_*.exe' |
            Where-Object { $_.FullName -notlike '*__MACOSX*' } | Select-Object -First 1
          if (-not $installer) { throw 'CKA installer not found in archive' }
          New-Item -ItemType Directory -Force C:\eSignerCKA | Out-Null
          & $installer.FullName /CURRENTUSER /VERYSILENT /SUPPRESSMSGBOXES /DIR="C:\eSignerCKA" | Out-Null

      # Authenticate the CKA (TOTP), load the cloud cert into the store, and sign
      # in the SAME step. The eSigner CKA cert/KSP session does not reliably
      # persist into a separate signtool process, so a split load-step -> sign-step
      # yields signtool's "No certificates were found that met all the given
      # criteria"; loading and signing must share one shell. Sign only our own PEs,
      # in place, with the standard signtool: SHA-256 file digest + RFC 3161
      # timestamp from SSL.com's TSA (so signatures outlive the cert). The bundled
      # .NET / WindowsAppSDK runtime DLLs are already Microsoft-signed - re-signing
      # them would waste quota and claim authorship we don't have. Full paths sign
      # the two same-named FindMyFiles.exe in place, so the old stage -> batch_sign
      # -> copy-back dance is gone.
      - name: Sign first-party binaries (eSigner CKA)
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        # Pass the secrets through the environment (masked, never expanded into
        # the command string) rather than interpolating them into the run body.
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          C:\eSignerCKA\eSignerCKATool.exe config `
            -mode product `
            -user "$env:ES_USERNAME" `
            -pass "$env:ES_PASSWORD" `
            -totp "$env:ES_TOTP_SECRET" `
            -key "C:\eSignerCKA\master.key" -r
          C:\eSignerCKA\eSignerCKATool.exe unload
          C:\eSignerCKA\eSignerCKATool.exe load

          # Diagnostics: show exactly what CKA placed in the stores (Subject is
          # masked in the log if it overlaps a secret; Thumbprint/HasPrivateKey
          # are what matter for the cert selection below).
          Write-Host '--- Cert:\CurrentUser\My ---'
          Get-ChildItem Cert:\CurrentUser\My | Format-Table Thumbprint, HasPrivateKey, Subject -AutoSize | Out-String | Write-Host
          Write-Host '--- Cert:\LocalMachine\My ---'
          Get-ChildItem Cert:\LocalMachine\My -ErrorAction SilentlyContinue | Format-Table Thumbprint, HasPrivateKey, Subject -AutoSize | Out-String | Write-Host

          # Pick OUR code-signing cert, preferring the one that actually carries
          # the CKA-backed private key.
          $cert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert |
            Where-Object { $_.Subject -like "*$env:SIGNER_SUBJECT_CONTAINS*" -and $_.HasPrivateKey } |
            Select-Object -First 1
          if (-not $cert) {
            $cert = Get-ChildItem Cert:\CurrentUser\My -CodeSigningCert |
              Where-Object { $_.Subject -like "*$env:SIGNER_SUBJECT_CONTAINS*" } |
              Select-Object -First 1
          }
          if (-not $cert) { throw "expected signing certificate ($env:SIGNER_SUBJECT_CONTAINS) not in store after CKA load" }
          $thumb = $cert.Thumbprint
          Write-Host "signing with thumbprint $thumb (HasPrivateKey=$($cert.HasPrivateKey))"

          # Prefer the x86 signtool: eSigner CKA exposes the signing key through a
          # 32-bit KSP (eSignerKSP) that a 64-bit signtool cannot load - it then
          # reports "No certificates were found that met all the given criteria"
          # even though the cert is in the store with HasPrivateKey=True (SSL.com
          # documents using x86). x86 verifies fine too. Fall back to x64 only if
          # x86 is somehow absent.
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x86\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $signtool) {
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
              Sort-Object FullName | Select-Object -Last 1
          }
          if (-not $signtool) { throw 'signtool.exe not found on runner' }
          $targets = 'FindMyFiles.exe', 'app/FindMyFiles.exe', 'app/fmf.exe', 'app/fmf-service.exe', 'app/fmf_engine.dll'
          foreach ($f in $targets) {
            & $signtool.FullName sign /fd sha256 /tr http://ts.ssl.com /td sha256 /sha1 $thumb "build/dist/FindMyFiles/$f"
            if ($LASTEXITCODE -ne 0) { throw "signtool sign failed for $f (exit $LASTEXITCODE)" }
          }

      # Never ship a "signed" build that is silently unsigned, untimestamped, or
      # signed by the wrong cert. signtool verify /pa /tw: exit 0 = chain valid +
      # timestamped, 2 = NOT timestamped, 1 = invalid -> any non-zero fails. Then
      # assert the signer subject (TimeStamperCertificate from Get-Authenticode-
      # Signature is unreliable under -FilePath, so we lean on signtool for the
      # timestamp and on the subject for identity).
      - name: Verify signatures
        if: env.HAVE_SIGNING == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          if (-not $signtool) {
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x86\signtool.exe" |
              Sort-Object FullName | Select-Object -Last 1
          }
          $targets = 'FindMyFiles.exe', 'app/FindMyFiles.exe', 'app/fmf.exe', 'app/fmf-service.exe', 'app/fmf_engine.dll'
          foreach ($f in $targets) {
            $p = "build/dist/FindMyFiles/$f"
            & $signtool.FullName verify /pa /tw $p
            if ($LASTEXITCODE -ne 0) { throw "verify failed for $f (exit $LASTEXITCODE) - chain invalid or NOT timestamped" }
            $sig = Get-AuthenticodeSignature $p
            if ($sig.SignerCertificate.Subject -notlike "*$env:SIGNER_SUBJECT_CONTAINS*") {
              throw "unexpected signer for $f - $($sig.SignerCertificate.Subject)"
            }
            Write-Host "verified: $f - $($sig.SignerCertificate.Subject) (chain+timestamp+signer OK)"
          }

      - name: Warn if unsigned
        if: env.HAVE_SIGNING != 'true'
        run: echo "::warning::Signing secrets absent - publishing UNSIGNED binaries (SmartScreen will warn end users). See docs/SIGNING.md to enable."

      - name: Upload signed bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-signed
          path: build/dist/FindMyFiles
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3) Zip + checksum the signed bundle, attest, and attach to the Release.
  # ---------------------------------------------------------------------------
  publish:
    needs: sign
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish }}
    runs-on: windows-latest
    permissions:
      contents: write # create the GitHub Release + upload assets
      id-token: write # OIDC token for keyless Sigstore signing (attestations)
      attestations: write # write build-provenance + SBOM attestations
    steps:
      # The repo is needed for `just package` (xtask) + the toolchain.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true

      - name: Download signed bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-signed
          path: build/dist/FindMyFiles

      - name: Download SBOMs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: build/sbom

      # Zip + checksum the (now-signed) bundle. Logic + output names live in xtask
      # (just package): find-my-files-v<version>-win-x64.zip + SHA256SUMS.txt under
      # build/package/. `just package` requires a vX.Y.Z TAG.
      - name: Package (zip + checksums)
        run: just package ${{ env.TAG }}

      # Build provenance + SBOM attestations for the published artifacts. Keyless
      # via the workflow's OIDC token (no stored secrets).
      # Verify: gh attestation verify <zip> --repo P4suta/find-my-files
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            build/package/find-my-files-*-win-x64.zip
            build/package/SHA256SUMS.txt

      - name: Attest Rust SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: build/package/find-my-files-*-win-x64.zip
          sbom-path: build/sbom/fmf-engine.cdx.json

      - name: Attest C# SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: build/package/find-my-files-*-win-x64.zip
          sbom-path: build/sbom/app.cdx.json

      - name: Attach assets to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            build/package/find-my-files-*-win-x64.zip
            build/package/SHA256SUMS.txt
            build/sbom/fmf-engine.cdx.json
            build/sbom/app.cdx.json
