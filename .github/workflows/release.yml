# Tag-driven build/sign/publish. Pushing a vX.Y.Z tag (or running this
# workflow manually with a tag) builds the distributable bundle
# (`just publish`), signs the PE binaries with Azure Trusted Signing when
# signing secrets are present, then zips + checksums + attaches to a GitHub
# Release whose notes are auto-generated from the commits since the last tag.
#
# Auth: the default GITHUB_TOKEN only — no PAT, no app key, no stored secret to
# manage. Signing is non-blocking: until the Azure account exists the run
# publishes an UNSIGNED zip with a ::warning:: rather than failing.
name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to build the release from (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # Resolve the tag from either trigger; reused for checkout, zip, release.
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      # secrets.* cannot be referenced in `if:`; hoist presence to a job-level
      # env bool, then gate the signing steps on env.HAVE_SIGNING.
      HAVE_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.SIGNING_ENDPOINT != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      # Provisions the pinned toolchain (rust 1.95 / dotnet 10 / just) from
      # mise.toml so the shipped artifact is built on the exact pins.
      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build distributable bundle
        run: just publish

      - name: Sign binaries (Azure Trusted Signing)
        if: env.HAVE_SIGNING == 'true'
        uses: azure/trusted-signing-action@v1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist\FindMyFiles
          files-folder-filter: exe,dll
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Warn if unsigned
        if: env.HAVE_SIGNING != 'true'
        run: echo "::warning::Signing secrets absent — publishing UNSIGNED binaries (SmartScreen will warn end users)."

      - name: Zip bundle
        shell: pwsh
        run: |
          $v = '${{ env.TAG }}'.TrimStart('v')
          Compress-Archive -Path dist/FindMyFiles/* -DestinationPath "find-my-files-v$v-win-x64.zip"

      - name: Checksums
        shell: pwsh
        run: |
          (Get-FileHash find-my-files-*-win-x64.zip -Algorithm SHA256).Hash | Out-File -Encoding ascii SHA256SUMS.txt

      - name: Attach assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            find-my-files-*-win-x64.zip
            SHA256SUMS.txt
