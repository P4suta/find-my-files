[book]
title = "find-my-files — Design Docs"
authors = ["Yasunobu"]
language = "en"
src = "."

# Render under the repo-root build/ tree, not docs/book (ADR-0021): every build
# artifact lives in one place. Relative to this book's root (docs/), so
# ../build/docs-book resolves to <repo>/build/docs-book.
[build]
build-dir = "../build/docs-book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/P4suta/find-my-files"
edit-url-template = "https://github.com/P4suta/find-my-files/edit/main/docs/{path}"
