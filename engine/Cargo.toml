[workspace]
resolver = "2"
members = ["crates/fmf-core", "crates/fmf-ffi", "crates/fmf-cli"]

[workspace.package]
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/find-my-files/find-my-files"

[workspace.dependencies]
fmf-core = { path = "crates/fmf-core" }
ntfs-reader = "0.4"
windows-sys = { version = "0.61", features = [
  "Win32_Foundation",
  "Win32_Storage_FileSystem",
  "Win32_System_Ioctl",
  "Win32_System_IO",
  "Win32_System_ProcessStatus",
  "Win32_System_Threading",
  "Win32_System_Time",
  "Win32_Security",
] }
memchr = "2"
rustc-hash = "2"
rayon = "1"
parking_lot = "0.12"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
xxhash-rust = { version = "0.8", features = ["xxh64"] }
regex = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Engine is always built/measured in release; keep stack traces usable.
# codegen-units=1: rustc partitions codegen units by module, so the query
# kernel's split into exec/sweep/matchers/memo cost ~10% query latency via
# lost inlining (measured, A/B at identical machine state). One unit keeps
# hot-path inlining independent of module layout.
[profile.release]
debug = "line-tables-only"
lto = "thin"
codegen-units = 1
