pre-commit:
  parallel: true
  jobs:
    - name: typos
      run: typos
    - name: rustfmt
      root: engine/
      glob: "*.rs"
      run: cargo fmt --all -- --check
    - name: taplo
      glob: "*.toml"
      # fmt --check (not plain `check`): enforce TOML *formatting*, not just
      # validity, repo-wide via taplo.toml.
      run: taplo fmt --check

pre-push:
  jobs:
    # Non-blocking reminder: the perf gates need an elevated shell, so they
    # cannot run here — nudge instead of silently skipping them. (echo exits 0,
    # so this never blocks the push.)
    - name: perf-nudge
      glob: "engine/crates/fmf-core/**"
      run: echo "fmf-core changed — run 'just perf-gate' from an elevated shell before merging"
    - name: clippy
      root: engine/
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: test
      root: engine/
      run: cargo test --workspace
    - name: test-app
      run: dotnet test app/FindMyFiles.Tests -p:SkipRustBuild=true
    # The xtask crate is its own workspace (engine's --workspace doesn't cover
    # it); gate it here too, only when xtask files change. One command per job
    # (no `&&` chaining) so the hook never depends on which shell runs it.
    # --target-dir build/xtask: these run from the repo root via --manifest-path,
    # and cargo discovers .cargo/config.toml from the CWD (not the manifest), so
    # the config's target-dir doesn't apply — route output to build/xtask
    # explicitly so the hook doesn't resurrect xtask/target (ADR-0021).
    - name: xtask-fmt
      glob: "xtask/**"
      run: cargo fmt --manifest-path xtask/Cargo.toml --all -- --check
    - name: xtask-clippy
      glob: "xtask/**"
      run: cargo clippy --manifest-path xtask/Cargo.toml --all-targets --target-dir build/xtask -- -D warnings
    - name: xtask-test
      glob: "xtask/**"
      run: cargo test --manifest-path xtask/Cargo.toml --target-dir build/xtask
