pre-commit:
  parallel: true
  jobs:
    - name: typos
      run: typos
    - name: rustfmt
      root: engine/
      glob: "*.rs"
      run: cargo fmt --all -- --check
    - name: taplo
      glob: "*.toml"
      run: taplo check

pre-push:
  jobs:
    # Non-blocking reminder: the perf gates need an elevated shell, so they
    # cannot run here — nudge instead of silently skipping them.
    - name: perf-nudge
      glob: "engine/crates/fmf-core/**"
      run: echo "fmf-core changed — run 'just perf-gate' from an elevated shell before merging" && exit 0
    - name: clippy
      root: engine/
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: test
      root: engine/
      run: cargo test --workspace
    - name: test-app
      run: dotnet test app/FindMyFiles.Tests -p:SkipRustBuild=true
