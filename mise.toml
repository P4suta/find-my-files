# Toolchain pinning for find-my-files.
# This machine manages tools via chezmoi + mise — do NOT install toolchains ad hoc;
# declare them here and run `mise install`.
[tools]
rust = "1.95"
dotnet = "10"
# Task runner (justfile). Declared here so `mise install` provisions it and CI
# (release.yml) builds the distributable via the same `just publish` recipe —
# no second copy of the bundling logic.
just = "1"
# Git-hook manager. `just setup` runs `lefthook install`; pinning it here closes a
# reproducibility gap (it was provisioned globally but never declared per-repo) and
# lets `just doctor` verify it. Registered mise short-name → aqua backend.
lefthook = "2"
# ETW-based sampling profiler (just profile) — pairs with the elevated
# terminals the engine already requires for real-volume work. cargo backend:
# the GitHub release tags (samply-v*) don't resolve via ubi/github backends.
"cargo:samply" = "0.13.1"
# mdBook — renders docs/ (ARCHITECTURE + ADRs) into the published design-docs
# site (just doc / pages.yml). cargo backend, version-pinned like samply so CI
# and local builds match.
"cargo:mdbook" = "0.4.40"
# Quality-gate tooling (CI + `just cov`/`deny`/`machete`). cargo backend;
# cargo.binstall below fetches prebuilt binaries instead of compiling from
# source (compiling mdbook took ~2min in CI).
"cargo:cargo-llvm-cov" = "0.6"
"cargo:cargo-deny" = "0.16"
"cargo:cargo-machete" = "0.7"
# Mutation testing (`just mutants`) — surfaces tests that pass even when code is
# broken (the reveal-class gap, ADR-0022). binstall fetches the prebuilt binary.
"cargo:cargo-mutants" = "27"
# Formatter/linter binaries the just recipes, lefthook hooks and CI all invoke
# (taplo fmt --check, typos). Pinned here so local and CI use one version — they
# were previously assumed on PATH (a reproducibility gap).
"cargo:taplo-cli" = "0.10"
"cargo:typos-cli" = "1"
# actionlint lints .github/workflows/*.yml (syntax, ${{ }} expression types,
# shellcheck over run: blocks). CI runs it via the raven-actions/actionlint
# action; pinned here so workflow edits can be validated locally before push
# (not a cargo crate — the github backend fetches the prebuilt release binary).
"github:rhysd/actionlint" = "1.7.7"

[settings]
# Fetch cargo: backend tools as prebuilt binaries (cargo-binstall) rather than
# `cargo install` from source — much faster in CI and locally.
cargo.binstall = true
